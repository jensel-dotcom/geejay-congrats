<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Congratulations Gee Jay!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#050810;
  font-family:'Oswald',sans-serif;
  /* CRITICAL: prevent ALL default touch behaviors that interfere */
  touch-action:none;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* Police lightbar */
.lightbar{
  position:fixed;top:0;left:0;right:0;height:6px;z-index:999;
  background:linear-gradient(90deg,#ff0000 50%,#0055ff 50%);
  background-size:200% 100%;
  animation:lb .45s linear infinite;
  box-shadow:0 0 18px 4px rgba(180,0,255,.6);
}
@keyframes lb{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

/* Background */
#bg{position:fixed;inset:0;z-index:0;
  background:linear-gradient(180deg,#050810 0%,#0a1228 50%,#0d1a38 100%);}

/* Stars */
#stars{position:fixed;inset:0;z-index:1;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;
  animation:tw var(--d,3s) ease-in-out infinite;}
@keyframes tw{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* Spotlight beams */
.beam{position:absolute;bottom:0;width:70px;height:50vh;
  transform-origin:bottom center;
  background:linear-gradient(180deg,transparent 0%,rgba(30,80,200,.07) 100%);
  clip-path:polygon(38% 100%,62% 100%,100% 0%,0% 0%);
  animation:sw var(--s,4s) ease-in-out infinite alternate;}
@keyframes sw{0%{transform:rotate(-14deg)}100%{transform:rotate(14deg)}}

/* Header */
#header{
  position:fixed;top:6px;left:0;right:0;z-index:10;
  text-align:center;padding:14px 10px 8px;
  background:linear-gradient(180deg,rgba(5,8,16,.96) 75%,transparent);
  pointer-events:none;
}
h1{font-family:'Bebas Neue',cursive;
  font-size:clamp(1.8rem,5.5vw,4rem);
  color:#f0c040;letter-spacing:.1em;line-height:1.05;
  text-shadow:0 0 28px rgba(240,192,64,.8),3px 3px 0 #7a5000;}
.sub{font-size:clamp(.6rem,1.7vw,.9rem);color:#8ab4f8;
  letter-spacing:.35em;text-transform:uppercase;margin-top:3px;}
.badges{font-size:22px;margin-bottom:4px;
  animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* Scene — NO pointer-events:none, let everything be clickable */
#scene{
  position:fixed;inset:0;z-index:5;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 clamp(4px,2.5vw,40px);
}

/* Officer */
#officer-wrap{
  position:relative;flex-shrink:0;
  width:clamp(180px,34vw,400px);
  transform-origin:bottom center;
}
#officer-wrap.shoot{animation:recoil .35s ease-out forwards;}
@keyframes recoil{
  0%{transform:translateX(0) rotate(0deg);}
  20%{transform:translateX(-10px) rotate(-3deg);}
  65%{transform:translateX(5px) rotate(1deg);}
  100%{transform:translateX(0) rotate(0deg);}
}
#officer-photo{width:100%;height:auto;display:block;
  filter:drop-shadow(0 0 18px rgba(26,58,110,.7)) drop-shadow(0 10px 30px rgba(0,0,0,.9));}

/* Target */
#target-wrap{
  position:relative;flex-shrink:0;
  width:clamp(68px,11vw,120px);
  margin-bottom:clamp(50px,8vh,115px);
}
#target-wrap.hit{animation:shake .22s ease-out;}
@keyframes shake{
  0%,100%{transform:rotate(0) translateX(0)}
  30%{transform:rotate(-7deg) translateX(-5px)}
  65%{transform:rotate(6deg) translateX(5px)}
}

/* Bullet */
.bullet{position:fixed;width:15px;height:6px;
  background:linear-gradient(90deg,#ffd700,#ff8c00,#c0392b);
  border-radius:50% 30% 30% 50%;z-index:50;pointer-events:none;
  box-shadow:0 0 9px 4px rgba(255,160,0,.8);}

/* Flash */
.flash{position:fixed;width:75px;height:75px;border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#ffe566 22%,#ff8800 58%,transparent 100%);
  z-index:55;pointer-events:none;
  animation:fl .18s ease-out forwards;
  transform:translate(-50%,-50%);}
@keyframes fl{0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
              100%{opacity:0;transform:translate(-50%,-50%) scale(2.5);}}

/* Smoke */
.smoke{position:fixed;width:22px;height:22px;border-radius:50%;
  background:rgba(200,200,200,.25);z-index:49;pointer-events:none;
  animation:sm .7s ease-out forwards;transform:translate(-50%,-50%);}
@keyframes sm{0%{opacity:.6;transform:translate(-50%,-50%) scale(.3);}
              100%{opacity:0;transform:translate(-50%,-90%) scale(3);}}

/* Spark */
.spark{position:fixed;width:6px;height:6px;border-radius:50%;
  z-index:51;pointer-events:none;}

/* Ripple */
.ripple{position:fixed;border-radius:50%;
  border:2px solid rgba(240,192,64,.5);pointer-events:none;z-index:60;
  transform:translate(-50%,-50%) scale(0);
  animation:rp .4s ease-out forwards;}
@keyframes rp{
  0%{opacity:1;width:10px;height:10px;transform:translate(-50%,-50%) scale(0);}
  100%{opacity:0;width:90px;height:90px;transform:translate(-50%,-50%) scale(1);}}

/* Ammo HUD */
#ammo{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;z-index:20;pointer-events:none;}
.bi{font-size:22px;filter:grayscale(1) brightness(.4);
  transition:filter .2s,transform .2s;}
.bi.fired{filter:grayscale(0) brightness(1.3) sepia(1);transform:scale(1.35);}

/* Hint */
#hint{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  font-size:clamp(.6rem,1.9vw,.85rem);color:rgba(138,180,248,.75);
  letter-spacing:.28em;text-transform:uppercase;text-align:center;
  animation:blink 1.4s ease-in-out infinite alternate;
  white-space:nowrap;z-index:20;pointer-events:none;}
@keyframes blink{0%{opacity:.35}100%{opacity:1}}

/* Celebration */
#celebrate{
  position:fixed;inset:0;z-index:900;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(5,8,16,.88);backdrop-filter:blur(7px);
}
#celebrate.show{display:flex;animation:ci .5s ease-out;}
@keyframes ci{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.g-main{font-family:'Bebas Neue',cursive;font-size:clamp(2.8rem,11vw,7rem);
  color:#fff;line-height:1;
  text-shadow:0 0 40px rgba(240,192,64,1),4px 4px 0 #f0c040,8px 8px 0 #7a5000;
  letter-spacing:.07em;animation:gb .65s ease-out;}
.g-sub{font-family:'Bebas Neue',cursive;font-size:clamp(1.4rem,4.5vw,3rem);
  color:#f0c040;letter-spacing:.28em;
  text-shadow:0 0 20px rgba(240,192,64,.85),2px 2px 0 #7a5000;
  animation:gb .65s .14s ease-out both;}
.g-name{font-family:'Bebas Neue',cursive;font-size:clamp(2.2rem,9vw,6rem);
  color:#4fc3f7;letter-spacing:.1em;
  text-shadow:0 0 28px rgba(79,195,247,.95),3px 3px 0 #0d4f6e;
  animation:gb .65s .28s ease-out both;}
@keyframes gb{
  0%{transform:scale(.25) rotate(-10deg);opacity:0;}
  60%{transform:scale(1.18) rotate(3deg);opacity:1;}
  80%{transform:scale(.94) rotate(-1deg);}
  100%{transform:scale(1) rotate(0deg);}}
.g-badge{font-size:clamp(2.5rem,7vw,5rem);margin-top:8px;
  animation:sp .9s ease-out;}
@keyframes sp{from{transform:rotate(-360deg) scale(0)}to{transform:rotate(0) scale(1)}}
#replay{margin-top:20px;font-family:'Oswald',sans-serif;font-size:1rem;
  letter-spacing:.3em;text-transform:uppercase;background:#f0c040;color:#0a0f1a;
  border:none;padding:13px 36px;cursor:pointer;font-weight:700;
  clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 50%,calc(100% - 8px) 100%,8px 100%,0% 50%);
  transition:transform .15s,background .15s;
  animation:gb .65s .5s ease-out both;
  /* IMPORTANT: make sure button is touchable */
  touch-action:manipulation;pointer-events:all;z-index:901;position:relative;}
#replay:hover{transform:scale(1.07);background:#ffe066;}
canvas#cc{position:fixed;inset:0;z-index:910;pointer-events:none;}
</style>
</head>

  <div id="target-wrap">
    <svg viewBox="0 0 100 210" xmlns="http://www.w3.org/2000/svg">
      <rect x="45" y="112" width="10" height="98" rx="3" fill="#5a3010"/>
      <rect x="40" y="200" width="20" height="8"  rx="2" fill="#3a2008"/>
      <rect x="8"  y="8"   width="84" height="108" rx="7" fill="#f5f0e0"/>
      <rect x="10" y="10"  width="80" height="104" rx="6" fill="#e8e0c0"/>
      <circle cx="50" cy="62" r="40" fill="#c0392b"/>
      <circle cx="50" cy="62" r="32" fill="#fff"/>
      <circle cx="50" cy="62" r="23" fill="#c0392b"/>
      <circle cx="50" cy="62" r="15" fill="#fff"/>
      <circle cx="50" cy="62" r="8"  fill="#c0392b"/>
      <circle cx="50" cy="62" r="3"  fill="#f0c040"/>
      <line x1="8" y1="62" x2="92" y2="62" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
      <line x1="50" y1="8" x2="50" y2="116" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
      <rect x="8" y="8" width="84" height="108" rx="7" fill="none" stroke="#8b5a2b" stroke-width="3"/>
      <g id="holes"></g>

</div>

<div id="ammo">
  <span class="bi" id="b1">🔵</span>
  <span class="bi" id="b2">🔵</span>
  <span class="bi" id="b3">🔵</span>
  <span class="bi" id="b4">🔵</span>
  <span class="bi" id="b5">🔵</span>
</div>
<div id="hint">👆 TAP ANYWHERE TO FIRE &nbsp;·&nbsp; 5 SHOTS TO CELEBRATE!</div>

<div id="celebrate">
  <canvas id="cc"></canvas>
  <div style="text-align:center;padding:16px 24px;position:relative;z-index:911;">
    <div class="g-main">🎊 BOOM! 🎊</div>
    <div class="g-sub">CONGRATULATIONS</div>
    <div class="g-name">GEE JAY!!</div>
    <div class="g-badge">🏅🚔🏅</div>
    <div style="color:#8ab4f8;font-size:.95rem;letter-spacing:.25em;margin-top:6px;opacity:.85;">FINEST OF THE FORCE · PNP</div>
    <button id="replay">🔄 SHOOT AGAIN</button>
  </div>
</div>

<script>
// ── Stars ──
(function(){
  var c=document.getElementById('stars');
  for(var i=0;i<70;i++){
    var s=document.createElement('div'); s.className='star';
    var sz=(Math.random()*2.5+0.5).toFixed(1);
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*52+'%;width:'+sz+'px;height:'+sz+'px;--d:'+(Math.random()*3+2).toFixed(1)+'s;animation-delay:'+(Math.random()*3).toFixed(1)+'s;';
    c.appendChild(s);
  }
})();

// ── State ──
var shots=0, busy=false, MAX=5;
var ow   = document.getElementById('officer-wrap');
var tw   = document.getElementById('target-wrap');
var cel  = document.getElementById('celebrate');
var hint = document.getElementById('hint');
var bs   = [1,2,3,4,5].map(function(i){return document.getElementById('b'+i);});
var hg   = document.getElementById('holes');

function getMuzzle(){
  var r=ow.getBoundingClientRect();
  return {x:r.right - r.width*0.04, y:r.top + r.height*0.34};
}
function getTarget(){
  var r=tw.getBoundingClientRect();
  return {x:r.left+r.width*0.5, y:r.top+r.height*0.30};
}

function fire(){
  if(busy||shots>=MAX) return;
  busy=true; shots++;

  // ammo
  bs[shots-1].textContent='🔴'; bs[shots-1].classList.add('fired');

  // recoil
  ow.classList.remove('shoot'); void ow.offsetWidth; ow.classList.add('shoot');
  ow.addEventListener('animationend',function(){ow.classList.remove('shoot');},{once:true});

  var m=getMuzzle(), tgt=getTarget();
  flash(m.x,m.y); smoke(m.x,m.y);
  bullet(m,tgt,function(){
    sparks(tgt.x,tgt.y); hole();
    tw.classList.remove('hit'); void tw.offsetWidth; tw.classList.add('hit');
    tw.addEventListener('animationend',function(){tw.classList.remove('hit');},{once:true});
    busy=false;
    if(shots>=MAX) setTimeout(celebrate,500);
  });
}

function hole(){
  var cx=20+Math.random()*60, cy=18+Math.random()*80;
  var h=document.createElementNS('http://www.w3.org/2000/svg','circle');
  h.setAttribute('cx',cx); h.setAttribute('cy',cy); h.setAttribute('r','4.5');
  h.setAttribute('fill','#0a0a0a'); h.setAttribute('stroke','#777'); h.setAttribute('stroke-width','1');
  hg.appendChild(h);
}

function flash(x,y){
  var f=document.createElement('div'); f.className='flash';
  f.style.left=x+'px'; f.style.top=y+'px'; document.body.appendChild(f);
  f.addEventListener('animationend',function(){f.remove();});
}

function smoke(x,y){
  for(var i=0;i<3;i++)(function(i){
    setTimeout(function(){
      var s=document.createElement('div'); s.className='smoke';
      s.style.left=(x+(Math.random()-.5)*14)+'px';
      s.style.top =(y+(Math.random()-.5)*14)+'px';
      document.body.appendChild(s);
      s.addEventListener('animationend',function(){s.remove();});
    },i*65);
  })(i);
}

function bullet(start,end,cb){
  var el=document.createElement('div'); el.className='bullet'; document.body.appendChild(el);
  var dx=end.x-start.x, dy=end.y-start.y;
  el.style.transform='rotate('+Math.atan2(dy,dx)*180/Math.PI+'deg)';
  var dur=210, t0=performance.now();
  (function step(now){
    var t=Math.min((now-t0)/dur,1);
    el.style.left=(start.x+dx*t-8)+'px';
    el.style.top =(start.y+dy*t-3)+'px';
    if(t<1) requestAnimationFrame(step); else{el.remove();cb();}
  })(t0);
}

function sparks(x,y){
  var cols=['#f0c040','#ff6600','#ffffff','#ff3030','#ffe066'];
  for(var i=0;i<12;i++)(function(){
    var el=document.createElement('div'); el.className='spark';
    var a=Math.random()*Math.PI*2, sp=Math.random()*75+25;
    var vx=Math.cos(a)*sp, vy=Math.sin(a)*sp;
    el.style.cssText='left:'+x+'px;top:'+y+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';transform:translate(-50%,-50%);';
    document.body.appendChild(el);
    var t0=performance.now(), dur=Math.random()*300+150;
    (function anim(now){
      var t=(now-t0)/dur; if(t>=1){el.remove();return;}
      el.style.left=(x+vx*t)+'px'; el.style.top=(y+vy*t+65*t*t)+'px'; el.style.opacity=1-t;
      requestAnimationFrame(anim);
    })(t0);
  })();
}

function ripple(x,y){
  var r=document.createElement('div'); r.className='ripple';
  r.style.left=x+'px'; r.style.top=y+'px'; document.body.appendChild(r);
  r.addEventListener('animationend',function(){r.remove();});
}

// ── Celebration ──
var craf, cpieces=[];
function celebrate(){
  cel.classList.add('show'); hint.style.display='none';
  confetti();
}
function reset(){
  shots=0; busy=false;
  cel.classList.remove('show'); hint.style.display='';
  bs.forEach(function(b){b.textContent='🔵'; b.classList.remove('fired');});
  while(hg.firstChild) hg.removeChild(hg.firstChild);
  var cv=document.getElementById('cc');
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
  cpieces=[]; if(craf) cancelAnimationFrame(craf);
}
function confetti(){
  var cv=document.getElementById('cc');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  var ctx=cv.getContext('2d');
  var cols=['#f0c040','#4fc3f7','#c0392b','#fff','#2ecc71','#e74c3c','#9b59b6','#f39c12'];
  cpieces=[];
  for(var i=0;i<180;i++) cpieces.push({
    x:Math.random()*cv.width, y:-20-Math.random()*200,
    w:Math.random()*12+5, h:Math.random()*18+6,
    c:cols[Math.floor(Math.random()*cols.length)],
    r:Math.random()*Math.PI*2, vx:(Math.random()-.5)*4,
    vy:Math.random()*4+1.5, vr:(Math.random()-.5)*.2, op:1
  });
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height); var alive=false;
    cpieces.forEach(function(p){
      p.x+=p.vx; p.y+=p.vy; p.vy+=.05; p.r+=p.vr;
      if(p.y>cv.height+20) p.op-=.025;
      if(p.op>0){ alive=true;
        ctx.save(); ctx.globalAlpha=Math.max(0,p.op);
        ctx.translate(p.x,p.y); ctx.rotate(p.r);
        ctx.fillStyle=p.c; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      }
    });
    if(alive) craf=requestAnimationFrame(draw);
  })();
}

// ── INPUT — attach to document.body, no z-index issues ──
document.body.addEventListener('touchstart', function(e){
  // If tapping replay button, let it through
  if(e.target.id==='replay') return;
  e.preventDefault();
  if(cel.classList.contains('show')) return;
  var t=e.changedTouches[0];
  ripple(t.clientX, t.clientY);
  fire();
}, {passive:false, capture:true});

document.body.addEventListener('click', function(e){
  if(e.target.id==='replay') return;
  if(cel.classList.contains('show')) return;
  ripple(e.clientX, e.clientY);
  fire();
}, {capture:true});

document.getElementById('replay').addEventListener('click', function(e){
  e.stopPropagation();
  reset();
});
document.getElementById('replay').addEventListener('touchend', function(e){
  e.stopPropagation();
  e.preventDefault();
  reset();
}, {passive:false});

window.addEventListener('resize', function(){
  var cv=document.getElementById('cc');
  if(cv){cv.width=window.innerWidth;cv.height=window.innerHeight;}
});
</script>
